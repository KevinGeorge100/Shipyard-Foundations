<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin George | DevOps CI/CD</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

            margin-bottom: 10px;
            color: #38bdf8;
        }

            margin: 10px 0;

        .tag {

            padding: 8px 16px;
            background: #22c55e;
            color: #0f172a;
            border-radius: 20px;

        }

        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        a {
            color: #38bdf8;

<body>
    <div class="container">
        <h1>🚀 CI/CD Pipeline Active</h1>

        <p>This website is automatically deployed using <strong>GitHub Actions</strong>.</p>
        <p>Built as part of my <strong>DevOps learning journey</strong>.</p>

        <div class="tag">✔ Pipeline Successful</div>

        <div class="footer">
            <p>👨‍💻 Kevin George</p>
