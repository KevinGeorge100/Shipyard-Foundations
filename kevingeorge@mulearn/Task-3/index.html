<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Showcase | Kevin George</title>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --primary: #6366f1;
      --bg: #0b0e14;
      --card-bg: #151921;
      --text: #e2e8f0;
      --accent: #10b981;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      width: 100%;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid #2d333b;
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }
    .header { text-align: center; margin-bottom: 2.5rem; }
    .badge {
      display: inline-block;
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 1rem;
      border: 1px solid var(--primary);
    }
    h1 { font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 0.5rem; }
    .status { color: var(--accent); font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
    
    /* Pipeline Visualization */
    .pipeline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 3rem 0;
      position: relative;
    }
    .pipeline::after {
      content: "";
      position: absolute;
      top: 50%; left: 10%; right: 10%;
      height: 2px; background: #2d333b;
      z-index: 1;
    }
    .step {
      background: var(--card-bg);
      border: 2px solid #2d333b;
      width: 60px; height: 60px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: 0.3s;
    }
    .step.active { border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
    .step-label { position: absolute; top: 70px; font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }

    .details {
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 1.5rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      border: 1px solid #2d333b;
    }
    .line { margin-bottom: 8px; display: flex; justify-content: space-between; }
    .label { color: #8b949e; }
    .val { color: var(--primary); }

    .footer { text-align: center; margin-top: 2.5rem; color: #484f58; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="badge">DEVOPS ASSIGNMENT #3</div>
        <h1>Kevin George</h1>
        <div class="status">
          <span style="width:10px;height:10px;background:var(--accent);border-radius:50%;display:inline-block;animation: pulse 2s infinite;"></span>
          Production Live: kevingeorge@mulearn
        </div>
      </div>

      <div class="pipeline">
        <div class="step active"><span title="Local Code">💻</span><div class="step-label">Push</div></div>
        <div class="step active"><span title="GitHub Actions">⚙️</span><div class="step-label">CI/CD</div></div>
        <div class="step active"><span title="Artifact Storage">📦</span><div class="step-label">Build</div></div>
        <div class="step active"><span title="GitHub Pages">🚀</span><div class="step-label">Deploy</div></div>
      </div>

      <div class="details">
        <div class="line"><span class="label">Architecture:</span><span class="val">GitHub Pages + Actions</span></div>
        <div class="line"><span class="label">Workflow:</span><span class="val">deploy.yml</span></div>
        <div class="line"><span class="label">Environment:</span><span class="val">Ubuntu-Latest</span></div>
        <div class="line"><span class="label">Task Reference:</span><span class="val">Shipyard Foundations</span></div>
      </div>

      <div class="footer">
        Automated Deployment Pipeline Verified • 2026 Term
      </div>
    </div>
  </div>

  <style>
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>
</body>
</html>
