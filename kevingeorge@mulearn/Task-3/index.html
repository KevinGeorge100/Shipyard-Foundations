<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kevin George | Task 3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid #333;
      border-radius: 16px;
      background: #1a1a1a;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
    }
    .badge {
      display: inline-block;
      background: #6366f1;
      color: white;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 1.2rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
    p { color: #aaa; font-size: 1rem; margin-bottom: 1.5rem; }
    .tags { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .tag {
      background: #2a2a2a;
      border: 1px solid #444;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #ccc;
    }
    .footer { margin-top: 2rem; font-size: 0.8rem; color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">CI/CD · Task 3</div>
    <h1>Kevin George</h1>
    <p>Deployed via GitHub Actions → GitHub Pages 🚀</p>
    <div class="tags">
      <span class="tag">kevingeorge@mulearn</span>
      <span class="tag">AJCE · CSE 2027</span>
      <span class="tag">Shipyard Foundations</span>
    </div>
    <div class="footer">Auto-deployed on every push to main ⚡</div>
  </div>
</body>
</html>
